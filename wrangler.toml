name = "docs"
pages_build_output_dir = "build/docs"

# ── RAG search configuration ──────────────────────────────────────────────────
# Public (non-secret) vars — safe to commit.
# Secrets (ANTHROPIC_API_KEY) are set via:
#   wrangler secret put ANTHROPIC_API_KEY
# or Cloudflare dashboard → Pages → Settings → Environment variables.

[vars]
# URL to the raw embeddings.json from kobiton/.ai main branch.
EMBEDDINGS_URL = "https://raw.githubusercontent.com/kobiton/.ai/main/rag-search/data/embeddings.json"

# Claude model for answer generation.
# Options: claude-haiku-4-5 (fast/cheap) | claude-sonnet-4-5 (higher quality)
LLM_MODEL = "claude-haiku-4-5"

# ── Cloudflare AI binding (query embedding via bge-small-en-v1.5) ─────────────
[ai]
binding = "AI"
