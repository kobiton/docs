name = "docs"
pages_build_output_dir = "build/docs"
compatibility_date = "2025-07-18"

# ── RAG search configuration ──────────────────────────────────────────────────
# RAG_API_URL and RAG_API_KEY are set as secrets in the Cloudflare dashboard:
#   Pages → Settings → Environment variables (both Production and Preview tabs)
# ANTHROPIC_API_KEY is NOT needed here — the LLM call is handled by rag-api on EKS.

[vars]
# RAG backend URL — always points to the EKS-hosted FastAPI.
# The CF Worker proxies all /api/query requests here; EMBEDDINGS_URL is not needed.
# Set the production value in: Cloudflare dashboard → Pages → Settings → Environment variables.
# RAG_API_URL = "https://rag-api.your-domain.com"

# Claude model for answer generation.
# Options: claude-haiku-4-5 (fast/cheap) | claude-sonnet-4-5 (higher quality)
# Only used in CF-native mode (no RAG_API_URL). Kept for reference.
# LLM_MODEL = "claude-haiku-4-5"

# EMBEDDINGS_URL is intentionally omitted.
# RAG is always deployed to EKS; the CF Worker proxies to FastAPI via RAG_API_URL.
# FastAPI loads embeddings.json from disk — EMBEDDINGS_URL is never read.

# ── Cloudflare AI binding ─────────────────────────────────────────────────────
# The AI binding (for query embedding via bge-small-en-v1.5) is configured in
# the Cloudflare dashboard for production:
#   Pages → <project> → Settings → Functions → AI Bindings → Add binding
#   Variable name: AI
#
# It is intentionally omitted here because declaring it in wrangler.toml forces
# wrangler to open a remote Cloudflare connection even during local dev, which
# requires CF authentication.
#
# For local dev, set RAG_API_URL=http://localhost:8000 in .dev.vars to proxy
# /api/query to the local FastAPI — no AI binding or CF login needed.
